<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arduino Web Simulator</title>
  <style>
    :root {
      --palette-w: 220px;
      --right-w: 400px;
      --toolbar-h: 44px;
      --clr-bg:     #0a0a0e;
      --clr-panel:  #121216;
      --clr-bar:    #141418;
      --clr-border: #222228;
      --clr-accent: #4a9eff;
      --clr-text:   #ccc;
      --clr-muted:  #555;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      overflow: hidden; height: 100%;
      background: var(--clr-bg);
      color: var(--clr-text);
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* ── 앱 루트 ──────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── 툴바 ──────────────────────────────────────────────── */
    #toolbar {
      height: var(--toolbar-h);
      flex-shrink: 0;
      background: var(--clr-bar);
      border-bottom: 1px solid var(--clr-border);
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 6px;
      user-select: none;
    }
    .toolbar-logo {
      font-weight: 700; font-size: 14px;
      color: var(--clr-accent); margin-right: 4px;
      white-space: nowrap;
    }
    .toolbar-sep {
      width: 1px; height: 22px;
      background: #2a2a34; margin: 0 2px; flex-shrink: 0;
    }
    .toolbar-btn {
      background: #1c1c24; border: 1px solid #2e2e3e;
      border-radius: 4px; color: #aaa;
      padding: 3px 8px; font-size: 12px;
      cursor: pointer; white-space: nowrap;
      transition: background 0.1s, color 0.1s;
    }
    .toolbar-btn:hover { background: #26263a; color: #eee; }
    .toolbar-btn:active { background: #1a1a2a; }
    #btn-run {
      background: #142414; border-color: #1e4a1e;
      color: #4af44a; font-weight: 600; padding: 3px 14px;
    }
    #btn-run:hover { background: #1a3018; }
    #btn-run.running { background: #2a0a0a; border-color: #5a1a1a; color: #f55; }
    #btn-run.error   { background: #2a1800; border-color: #5a3000; color: #fa8; }
    #status-indicator {
      width: 8px; height: 8px; border-radius: 50%;
      background: #333; flex-shrink: 0; margin-left: 2px;
      transition: background 0.3s, box-shadow 0.3s;
    }
    #status-indicator.running { background: #4af44a; box-shadow: 0 0 8px #4af44a88; }
    #status-indicator.error   { background: #fa4;   box-shadow: 0 0 8px #fa488; }

    /* ── 메인 영역 ──────────────────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── 팔레트 패널 ────────────────────────────────────────── */
    #palette-panel {
      width: var(--palette-w);
      min-width: 140px;
      max-width: 420px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--clr-panel);
      border-right: 1px solid var(--clr-border);
      overflow: hidden;
    }
    .palette-header {
      padding: 8px 8px 4px;
      border-bottom: 1px solid var(--clr-border);
      flex-shrink: 0;
    }
    .palette-board-select {
      width: 100%;
      background: #1a1a26; border: 1px solid #2e2e3e;
      border-radius: 4px; color: var(--clr-text);
      padding: 4px 6px; font-size: 11px; cursor: pointer;
      margin-bottom: 6px;
    }
    .palette-search-wrap {
      position: relative;
    }
    .palette-search-wrap::before {
      content: '🔍';
      position: absolute; left: 7px; top: 50%; transform: translateY(-50%);
      font-size: 11px; pointer-events: none;
    }
    #palette-search {
      width: 100%; background: #1a1a26;
      border: 1px solid #2e2e3e; border-radius: 4px;
      color: var(--clr-text); padding: 4px 6px 4px 26px;
      font-size: 11px; outline: none;
    }
    #palette-search:focus { border-color: #3a3a5e; }
    #palette-list {
      flex: 1; overflow-y: auto; padding: 6px 4px;
    }
    .palette-category {
      font-size: 9px; color: var(--clr-muted);
      text-transform: uppercase; letter-spacing: 0.6px;
      padding: 6px 8px 2px; font-weight: 600;
    }
    .palette-item {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 8px; border-radius: 4px;
      cursor: grab; font-size: 11px; color: #aaa;
      transition: background 0.1s, color 0.1s;
    }
    .palette-item:hover { background: #1c1c2e; color: #eee; }
    .palette-item:active { cursor: grabbing; }
    .palette-icon { font-size: 14px; min-width: 18px; }
    .palette-label { flex: 1; }
    .palette-edit-btn {
      background: transparent; border: none; cursor: pointer;
      font-size: 10px; opacity: 0; transition: opacity 0.1s; padding: 0 2px;
    }
    .palette-item:hover .palette-edit-btn { opacity: 0.6; }
    .palette-edit-btn:hover { opacity: 1 !important; }
    .palette-add-btn {
      width: calc(100% - 8px); margin: 4px;
      padding: 5px; background: #0e1e0e;
      border: 1px dashed #1e3e1e; border-radius: 4px;
      color: #4f4; font-size: 10px; cursor: pointer; text-align: center;
    }
    .palette-add-btn:hover { background: #122012; }

    /* ── 패널 구분선 (리사이즈) ───────────────────────────────── */
    .panel-divider {
      width: 4px; flex-shrink: 0;
      background: var(--clr-border);
      cursor: col-resize;
      transition: background 0.15s;
      position: relative;
      z-index: 10;
    }
    .panel-divider:hover,
    .panel-divider.dragging { background: var(--clr-accent); opacity: 0.6; }

    /* ── 캔버스 ─────────────────────────────────────────────── */
    #canvas {
      flex: 1; min-width: 100px;
      position: relative; overflow: hidden;
      background: #0f0f13;
      background-image:
        radial-gradient(circle, #22222e 1px, transparent 1px);
      background-size: 20px 20px;
      cursor: default;
    }
    #canvas-hint {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      text-align: center; color: #2e2e3e;
      pointer-events: none; font-size: 13px; line-height: 1.9;
    }
    #canvas-hint .hint-icon { font-size: 36px; display: block; margin-bottom: 8px; }

    /* ── 유효성 검사 바 ───────────────────────────────────────── */
    #validation-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: #09090f; border-top: 1px solid #1a1a22;
      z-index: 10; font-size: 10px; display: none;
    }
    .validation-item {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px; cursor: pointer;
      transition: background 0.1s;
    }
    .validation-item:hover { background: #141420; }
    .validation-item.error   { color: #f55; }
    .validation-item.warning { color: #fa4; }
    .validation-item.info    { color: #4af; }
    .validation-icon { font-size: 10px; flex-shrink: 0; }

    /* ── 우측 패널 ──────────────────────────────────────────── */
    #right-panel {
      width: var(--right-w);
      min-width: 200px;
      max-width: 700px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--clr-panel);
      border-left: 1px solid var(--clr-border);
      overflow: hidden;
    }

    /* ── 탭 바 ──────────────────────────────────────────────── */
    .right-tab-bar {
      display: flex;
      background: var(--clr-bar);
      border-bottom: 1px solid var(--clr-border);
      flex-shrink: 0;
    }
    .right-tab-btn {
      padding: 9px 16px; font-size: 12px; color: #555;
      cursor: pointer; border: none; background: transparent;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .right-tab-btn:hover { color: #888; }
    .right-tab-btn.active { color: var(--clr-accent); border-bottom-color: var(--clr-accent); }

    /* ── 탭 컨텐츠 ──────────────────────────────────────────── */
    .right-tab-pane {
      display: none;
      flex: 1; min-height: 0;
      flex-direction: column;
      overflow: hidden;
    }
    .right-tab-pane.active { display: flex; }

    /* ── 코드 에디터 ────────────────────────────────────────── */
    #editor {
      flex: 1; min-height: 0; overflow: hidden;
      background: #1e1e1e;
    }

    /* ── 시리얼 패널 ────────────────────────────────────────── */
    #serial-panel {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
    }
    .serial-toolbar {
      display: flex; align-items: center;
      padding: 4px 8px; gap: 6px;
      background: #0e0e16; border-bottom: 1px solid var(--clr-border);
      flex-shrink: 0;
    }
    .serial-label { font-size: 11px; color: #666; font-weight: 600; }
    .serial-baud {
      background: #1a1a26; border: 1px solid #2e2e3e;
      border-radius: 3px; color: #888; padding: 1px 4px; font-size: 10px;
      margin-left: auto;
    }
    #serial-output {
      flex: 1; overflow-y: auto;
      padding: 6px 10px; margin: 0;
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 11px; color: #4af44a;
      background: #09090f; white-space: pre-wrap; word-break: break-all;
    }
    .serial-input-row {
      display: flex; gap: 4px; padding: 4px 6px;
      border-top: 1px solid var(--clr-border);
      background: #0e0e16; flex-shrink: 0;
    }
    #serial-input {
      flex: 1; background: #1a1a26; border: 1px solid #2e2e3e;
      border-radius: 3px; color: var(--clr-text);
      padding: 3px 7px; font-size: 11px; font-family: monospace; outline: none;
    }
    #serial-input:focus { border-color: #3a3a5e; }
    #btn-serial-send { padding: 3px 10px; font-size: 11px; }
    #btn-clear-serial { padding: 2px 7px; font-size: 10px; }

    /* ── 속성 패널 ──────────────────────────────────────────── */
    #property-panel {
      flex: 1; overflow-y: auto;
      background: #0e0e14; font-size: 11px;
    }
    .prop-empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; color: #2a2a3a;
      font-size: 11px; text-align: center; line-height: 1.7;
    }
    .prop-empty-icon { font-size: 24px; margin-bottom: 8px; opacity: 0.5; }
    .prop-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; background: #141420;
      border-bottom: 1px solid var(--clr-border);
    }
    .prop-icon { font-size: 18px; }
    .prop-title { font-size: 12px; font-weight: 700; color: #ddd; }
    .prop-id { font-size: 9px; color: #444; font-family: monospace; }
    .prop-delete {
      margin-left: auto; background: transparent; border: none;
      cursor: pointer; font-size: 14px; opacity: 0.4;
    }
    .prop-delete:hover { opacity: 1; }
    .prop-section { padding: 6px 10px; border-bottom: 1px solid #16161e; }
    .prop-section-title {
      font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px;
      color: #444; margin-bottom: 4px; font-weight: 600;
    }
    .prop-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; font-size: 10px; }
    .prop-label { color: #555; min-width: 60px; flex-shrink: 0; }
    .prop-value { color: #999; flex: 1; }
    .spec-highlight { color: #4af44a; font-weight: 600; }
    .prop-input {
      background: #1a1a26; border: 1px solid #2e2e3e; border-radius: 3px;
      color: var(--clr-text); padding: 2px 6px; font-size: 10px; width: 70px;
    }
    .prop-unit { color: #444; font-size: 10px; }
    .prop-select {
      background: #1a1a26; border: 1px solid #2e2e3e; border-radius: 3px;
      color: var(--clr-text); padding: 2px 4px; font-size: 10px; flex: 1;
    }
    .prop-pin-row { display: flex; align-items: flex-start; gap: 6px; padding: 2px 0; font-size: 10px; }
    .prop-pin-name {
      font-family: monospace; font-size: 9px; min-width: 54px;
      padding: 1px 4px; border-radius: 3px; text-align: center; flex-shrink: 0;
    }
    .pin-type-power        { background: #3a0a0a; color: #f88; border: 1px solid #6a1a1a; }
    .pin-type-ground       { background: #0a1a0a; color: #8a8; border: 1px solid #1a3a1a; }
    .pin-type-input        { background: #0a0a3a; color: #88f; border: 1px solid #1a1a6a; }
    .pin-type-output       { background: #0a2a3a; color: #8cf; border: 1px solid #1a5a6a; }
    .pin-type-signal       { background: #1e1e0a; color: #cc8; border: 1px solid #3e3e1a; }
    .pin-type-bidirectional{ background: #1e0a2a; color: #a8f; border: 1px solid #3e1a5a; }
    .prop-pin-desc { color: #555; font-size: 9px; line-height: 1.4; }
    .prop-note { color: #555; font-size: 9px; padding: 2px 10px; line-height: 1.5; }
    .pin-info-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 6px; border-radius: 3px; font-size: 10px;
      font-family: monospace; font-weight: 600;
    }

    /* ── 컨텍스트 메뉴 (공통) ────────────────────────────────── */
    .ctx-menu {
      position: fixed; z-index: 9999;
      background: #1c1c28; border: 1px solid #2e2e42;
      border-radius: 6px; padding: 4px 0; min-width: 150px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.65);
      font-size: 12px; color: var(--clr-text); user-select: none;
    }
    .ctx-menu .ctx-title {
      padding: 5px 12px 3px; font-size: 9px;
      color: var(--clr-muted); text-transform: uppercase; letter-spacing: 0.5px;
    }
    .ctx-menu .ctx-item {
      padding: 6px 14px; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: background 0.1s;
    }
    .ctx-menu .ctx-item:hover { background: #252538; color: #eee; }
    .ctx-menu .ctx-item.active { color: var(--clr-accent); }
    .ctx-menu .ctx-sep { height: 1px; background: #252535; margin: 3px 0; }
    .ctx-menu .ctx-item.danger:hover { background: #2e0e0e; color: #f55; }

    /* ── 파일 입력 숨김 ──────────────────────────────────────── */
    #file-input { display: none; }

    /* ── 스크롤바 (공통) ─────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a38; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a52; }
  </style>
</head>
<body>
  <div id="app">

    <!-- ── 툴바 ──────────────────────────────────────────────── -->
    <div id="toolbar">
      <span class="toolbar-logo">⚡ Arduino Sim</span>
      <div class="toolbar-sep"></div>

      <button id="btn-new"  class="toolbar-btn" title="새 회로 (Ctrl+N)">🗋 새로</button>
      <button id="btn-run"  class="toolbar-btn" title="실행/정지">▶ 실행</button>

      <div class="toolbar-sep"></div>

      <button id="btn-undo"  class="toolbar-btn" title="실행 취소 (Ctrl+Z)">↩</button>
      <button id="btn-redo"  class="toolbar-btn" title="다시 실행 (Ctrl+Y)">↪</button>

      <div class="toolbar-sep"></div>

      <button id="btn-save"  class="toolbar-btn" title="회로 저장 (Ctrl+S)">💾</button>
      <button id="btn-load"  class="toolbar-btn" title="회로 불러오기">📂</button>
      <input  id="file-input" type="file" accept=".json">

      <div class="toolbar-sep"></div>

      <button id="btn-zoom-in"  class="toolbar-btn" title="확대 (+)">+</button>
      <button id="btn-zoom-out" class="toolbar-btn" title="축소 (-)">−</button>
      <button id="btn-fit"      class="toolbar-btn" title="전체 보기">⊡</button>

      <div id="status-indicator" title="시뮬레이터 상태"></div>
    </div>

    <!-- ── 메인 영역 ──────────────────────────────────────────── -->
    <div id="main">

      <!-- 부품 팔레트 -->
      <div id="palette-panel">
        <div class="palette-header">
          <select id="board-select" class="palette-board-select" title="보드 선택">
            <option value="arduino-uno">Arduino Uno R3</option>
            <option value="arduino-nano">Arduino Nano</option>
            <option value="esp32-c3-supermini">ESP32-C3 Super Mini</option>
            <option value="esp32-devkit">ESP32 DevKit V1</option>
          </select>
          <div class="palette-search-wrap">
            <input id="palette-search" type="search" placeholder="부품 검색...">
          </div>
        </div>
        <div id="palette-list">
          <!-- JS로 채워짐 -->
        </div>
      </div>

      <!-- 리사이즈 핸들 (팔레트↔캔버스) -->
      <div class="panel-divider" id="divider-left" title="드래그로 크기 조절"></div>

      <!-- 회로 캔버스 -->
      <div id="canvas">
        <div id="canvas-hint">
          <span class="hint-icon">🔌</span>
          부품을 왼쪽에서 드래그하거나<br>더블클릭하여 추가하세요<br>
          <small style="color:#1e1e2e">휠: 줌 · Alt+드래그: 이동 · 우클릭: 메뉴</small>
        </div>
        <div id="validation-bar"></div>
      </div>

      <!-- 리사이즈 핸들 (캔버스↔우측) -->
      <div class="panel-divider" id="divider-right" title="드래그로 크기 조절"></div>

      <!-- 우측 패널 (탭) -->
      <div id="right-panel">
        <div class="right-tab-bar">
          <button class="right-tab-btn active" data-tab="editor">코드 편집기</button>
          <button class="right-tab-btn" data-tab="serial">시리얼 모니터</button>
          <button class="right-tab-btn" data-tab="props">속성</button>
        </div>

        <!-- 탭 1: 코드 에디터 -->
        <div class="right-tab-pane active" id="tab-editor">
          <div id="editor"></div>
        </div>

        <!-- 탭 2: 시리얼 모니터 -->
        <div class="right-tab-pane" id="tab-serial">
          <div id="serial-panel">
            <div class="serial-toolbar">
              <span class="serial-label">📟 시리얼 모니터</span>
              <select class="serial-baud">
                <option>9600 baud</option>
                <option>115200 baud</option>
              </select>
              <button id="btn-clear-serial" class="toolbar-btn">지우기</button>
            </div>
            <pre id="serial-output"></pre>
            <div class="serial-input-row">
              <input id="serial-input" type="text" placeholder="전송할 데이터 입력...">
              <button id="btn-serial-send" class="toolbar-btn">전송</button>
            </div>
          </div>
        </div>

        <!-- 탭 3: 속성 패널 -->
        <div class="right-tab-pane" id="tab-props">
          <div id="property-panel"></div>
        </div>
      </div>

    </div><!-- /#main -->
  </div><!-- /#app -->

  <script type="module" src="/src/app.ts"></script>
</body>
</html>
